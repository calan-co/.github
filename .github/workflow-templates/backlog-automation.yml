name: Backlog Automation

# Starter workflow for doc-vader backlog automation.
# Reference implementation: https://github.com/calan-co/doc-vader/blob/main/.github/workflows/backlog-automation.yml
#
# To sync updates from the reference, compare this file's content and re-copy
# any changes to the reusable sub-workflow `uses:` refs or trigger conditions.
#
# Prerequisites:
#   1. Create .doc-vader/backlog-consumer.json (see https://github.com/calan-co/doc-vader/docs).
#   2. For repos outside calan-co org: add PACKAGES_READ_TOKEN secret (PAT with read:packages).

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview eligible updates without writing changes'
        required: false
        default: false
        type: boolean
  pull_request:
    types: [opened, edited, reopened, synchronize, closed]
    branches:
      - main
  workflow_run:
    workflows: ['CI']
    types: [completed]

permissions:
  contents: write
  pull-requests: read

jobs:
  ingest-pull-request:
    name: Ingest Pull Request Event
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    uses: calan-co/doc-vader/.github/workflows/backlog-ingest-pull-request.yml@main
    with:
      consumer-config: .doc-vader/backlog-consumer.json
    secrets:
      packages-read-token: ${{ secrets.PACKAGES_READ_TOKEN }}

  ingest-workflow-run:
    name: Ingest Workflow Run Event
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      github.event.workflow_run.conclusion == 'success'
    uses: calan-co/doc-vader/.github/workflows/backlog-ingest-workflow-run.yml@main
    with:
      consumer-config: .doc-vader/backlog-consumer.json
    secrets:
      packages-read-token: ${{ secrets.PACKAGES_READ_TOKEN }}

  sweep:
    name: Sweep Eligible Work Items
    if: github.event_name == 'workflow_dispatch'
    uses: calan-co/doc-vader/.github/workflows/backlog-sweep.yml@main
    with:
      dry-run: ${{ inputs.dry_run || false }}
      consumer-config: .doc-vader/backlog-consumer.json
      backlog-dir: backlog
    secrets:
      packages-read-token: ${{ secrets.PACKAGES_READ_TOKEN }}
